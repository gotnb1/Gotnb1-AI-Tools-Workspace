<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ศูนย์รวมผู้ช่วย AI (AI Tools Hub)</title>
    <!-- โหลด Tailwind CSS เพื่อจัดการความสวยงาม -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* สไตล์สำหรับ Animation การโหลด */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .animate-spin {
            animation: spin 1s linear infinite;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="root"></div>

    <!-- ตั้งค่า Import Map สำหรับดึง React และไลบรารีไอคอน -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.292.0"
        }
      }
    </script>

    <!-- โหลด Babel เพื่อแปลงโค้ด React (JSX) ให้ทำงานบนเบราว์เซอร์ได้ -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- ส่วนของโค้ดโปรแกรมหลัก -->
    <script type="text/babel" data-type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Bot, Search, PenTool, Palette, BarChart3, Users, Code2, ExternalLink, Sparkles, Loader2, MessageSquare } from 'lucide-react';

        const aiData = [
          {
            id: 0,
            title: "เลขาฯ ส่วนตัว",
            subtitle: "(AI Assistant)",
            icon: <Bot className="w-7 h-7 text-white" />,
            gradient: "from-blue-500 to-cyan-400",
            tools: [
              { 
                name: "Geni1 (Gemini)", 
                url: "https://gemini.google.com/", 
                desc: "เหมาะสมที่สุดหากการทำงานเกี่ยวข้องกับ Google Workspace (Gmail, Drive, Docs, Calendar)" 
              }
            ]
          },
          {
            id: 1,
            title: "การค้นคว้าและสืบค้น",
            subtitle: "(Research & Search)",
            icon: <Search className="w-7 h-7 text-white" />,
            gradient: "from-purple-500 to-indigo-500",
            tools: [
              { 
                name: "Perplexity AI", 
                url: "https://www.perplexity.ai/", 
                desc: "ค้นหาข้อมูลที่ต้องการความถูกต้องสูงและมีแหล่งอ้างอิง สรุปคำตอบพร้อมแนบลิงก์ที่มาให้ทันที" 
              },
              { 
                name: "DeepSeek", 
                url: "https://chat.deepseek.com/", 
                desc: "งานวิจัยหรืองานเชิงวิชาการ ต้องการความแม่นยำสูงในราคาประหยัด โดดเด่นด้านคิดวิเคราะห์เชิงตรรกะ" 
              }
            ]
          },
          {
            id: 2,
            title: "การเขียนและใช้เหตุผล",
            subtitle: "(Writing & Reasoning)",
            icon: <PenTool className="w-7 h-7 text-white" />,
            gradient: "from-emerald-500 to-teal-400",
            tools: [
              { 
                name: "Claude (Anthropic)", 
                url: "https://claude.ai/", 
                desc: "การเขียนที่ต้องการภาษาเป็นธรรมชาติ อ่านไฟล์ PDF หรือเอกสารยาวๆ ได้โดยไม่หลุดเนื้อหา" 
              },
              { 
                name: "Jasper AI", 
                url: "https://www.jasper.ai/", 
                desc: "งานเขียนด้านการตลาด มีเทมเพลตเฉพาะทางสำหรับแคปชันโซเชียล บทความ SEO หรืออีเมลขายของ" 
              }
            ]
          },
          {
            id: 3,
            title: "งานออกแบบและวิดีโอ",
            subtitle: "(Design & Video)",
            icon: <Palette className="w-7 h-7 text-white" />,
            gradient: "from-pink-500 to-rose-400",
            tools: [
              { 
                name: "Midjourney", 
                url: "https://www.midjourney.com/", 
                desc: "สร้างภาพงานศิลปะหรืองานภาพเสมือนจริง เพื่อใช้ในงานนำเสนอ หรือสื่อโฆษณา" 
              },
              { 
                name: "Canva AI", 
                url: "https://www.canva.com/", 
                desc: "สำหรับคนที่ไม่ใช่นักออกแบบ ช่วยทำกราฟิก สไลด์ หรือวิดีโอสั้นอย่างรวดเร็วด้วย Magic Design" 
              },
              { 
                name: "Runway", 
                url: "https://runwayml.com/", 
                desc: "งานตัดต่อและสร้างวิดีโอขั้นสูง สร้างวิดีโอจากข้อความ หรือลบสิ่งของออกจากวิดีโอได้อย่างแนบเนียน" 
              }
            ]
          },
          {
            id: 4,
            title: "การวิเคราะห์ข้อมูล",
            subtitle: "(Data Analysis)",
            icon: <BarChart3 className="w-7 h-7 text-white" />,
            gradient: "from-amber-500 to-orange-400",
            tools: [
              { 
                name: "ChatGPT (Advanced Data)", 
                url: "https://chatgpt.com/", 
                desc: "อัปโหลดไฟล์ Excel/CSV ทำกราฟ หา Insight และเขียนโค้ด Python วิเคราะห์สถิติที่ซับซ้อนได้" 
              },
              { 
                name: "Julius AI", 
                url: "https://julius.ai/", 
                desc: "เฉพาะทางเรื่องการจัดการข้อมูลสถิติ และสร้างการแสดงผลข้อมูล (Data Visualization) ที่สวยงามแม่นยำ" 
              }
            ]
          },
          {
            id: 5,
            title: "การประชุมและงานธุรการ",
            subtitle: "(Meetings & Operations)",
            icon: <Users className="w-7 h-7 text-white" />,
            gradient: "from-sky-500 to-blue-600",
            tools: [
              { 
                name: "Otter.ai / Fireflies.ai", 
                url: "https://otter.ai/", 
                desc: "บันทึกเสียงและถอดความการประชุมอัตโนมัติ พร้อมสรุปประเด็นสำคัญ (Action Items) ทันทีหลังจบ" 
              },
              { 
                name: "Zapier Central", 
                url: "https://central.zapier.com/", 
                desc: "เชื่อมต่อ AI เข้ากับแอปอื่นๆ สร้างระบบอัตโนมัติ เช่น ให้ AI ตอบอีเมลลูกค้า หรือบันทึกข้อมูล" 
              }
            ]
          },
          {
            id: 6,
            title: "การเขียนโปรแกรม",
            subtitle: "(Coding)",
            icon: <Code2 className="w-7 h-7 text-white" />,
            gradient: "from-slate-600 to-gray-500",
            tools: [
              { 
                name: "GitHub Copilot", 
                url: "https://github.com/features/copilot", 
                desc: "ผู้ช่วยนักพัฒนาโปรแกรม ช่วยเขียนโค้ด และแก้บั๊กอัตโนมัติ" 
              },
              { 
                name: "Claude Code", 
                url: "https://claude.ai/", 
                desc: "อธิบายการทำงานของระบบ แก้ไขบั๊ก และช่วยเขียนโค้ดได้อย่างรวดเร็วและลึกซึ้ง" 
              }
            ]
          }
        ];

        function App() {
          const [searchTerm, setSearchTerm] = useState("");
          const [taskInput, setTaskInput] = useState("");
          const [recommendation, setRecommendation] = useState("");
          const [isGenerating, setIsGenerating] = useState(false);
          const [apiError, setApiError] = useState("");

          const handleAskGemini = async () => {
            if (!taskInput.trim()) return;
            setIsGenerating(true);
            setRecommendation("");
            setApiError("");

            try {
              const apiKey = ""; 
              const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

              const toolsList = aiData.map(c => c.title + ": " + c.tools.map(t => t.name).join(", ")).join(" | ");
              
              const systemPrompt = "คุณคือผู้เชี่ยวชาญด้าน AI หน้าที่ของคุณคือการอ่านความต้องการของผู้ใช้ จากนั้นเลือกแนะนำเครื่องมือ AI ที่เหมาะสมที่สุดจาก 'รายการ AI ในระบบ' ที่ให้ไป (เลือกมา 1-2 ตัว) พร้อมอธิบายเหตุผลสั้นๆ และเขียน Prompt ตั้งต้นให้ผู้ใช้สามารถนำไปก๊อปปี้วางใน AI ตัวนั้นได้เลย แนะนำเป็นภาษาไทยด้วยน้ำเสียงเป็นมิตรและจัดรูปแบบให้อ่านง่าย";
              const userQuery = `งานที่ฉันต้องการทำ: ${taskInput}\n\nรายการ AI ในระบบ: ${toolsList}`;

              const payload = {
                contents: [{ parts: [{ text: userQuery }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
              };

              const delays = [1000, 2000, 4000, 8000, 16000];
              let result;
              
              for (let i = 0; i < 5; i++) {
                try {
                  const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                  });
                  if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                  result = await res.json();
                  break;
                } catch (err) {
                  if (i === 4) throw err;
                  await new Promise(r => setTimeout(r, delays[i]));
                }
              }

              const text = result?.candidates?.[0]?.content?.parts?.[0]?.text;
              if (text) {
                setRecommendation(text);
              } else {
                throw new Error("ไม่ได้รับข้อความตอบกลับจาก API");
              }
            } catch (err) {
              setApiError("เกิดข้อผิดพลาดในการเชื่อมต่อกับผู้ช่วย AI กรุณาลองใหม่อีกครั้ง");
            } finally {
              setIsGenerating(false);
            }
          };

          const filteredData = aiData.map(category => {
            const filteredTools = category.tools.filter(tool => 
              tool.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
              tool.desc.toLowerCase().includes(searchTerm.toLowerCase()) ||
              category.title.toLowerCase().includes(searchTerm.toLowerCase())
            );
            return { ...category, tools: filteredTools };
          }).filter(category => category.tools.length > 0);

          return (
            <div className="min-h-screen p-4 md:p-8">
              <div className="max-w-7xl mx-auto mb-10">
                
                {/* Header */}
                <div className="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-8">
                  <div className="flex items-center space-x-4 mb-4 md:mb-0">
                    <div className="bg-gradient-to-r from-blue-600 to-purple-600 p-3 rounded-2xl shadow-lg shadow-blue-500/30">
                      <Sparkles className="w-8 h-8 text-white" />
                    </div>
                    <div>
                      <h1 className="text-2xl md:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600">
                        AI Tools Workspace
                      </h1>
                      <p className="text-sm text-gray-500 mt-1">
                        ศูนย์รวมผู้ช่วย AI ของคุณ เลือกใช้งานตามหมวดหมู่ได้ทันที
                      </p>
                    </div>
                  </div>

                  <div className="relative w-full md:w-72">
                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                      <Search className="h-5 w-5 text-gray-400" />
                    </div>
                    <input
                      type="text"
                      className="block w-full pl-10 pr-3 py-2.5 border border-gray-200 rounded-xl leading-5 bg-gray-50 placeholder-gray-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all sm:text-sm"
                      placeholder="ค้นหา AI หรือ ฟังก์ชัน..."
                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}
                    />
                  </div>
                </div>

                {/* AI Assistant Section */}
                <div className="bg-gradient-to-br from-indigo-50 to-purple-50 p-6 rounded-3xl shadow-sm border border-indigo-100 mb-8">
                  <div className="flex items-center space-x-3 mb-4">
                    <MessageSquare className="w-6 h-6 text-indigo-600" />
                    <h2 className="text-xl font-bold text-indigo-900">ไม่แน่ใจว่าต้องใช้ AI ตัวไหน? ให้ระบบช่วยแนะนำเลย</h2>
                  </div>
                  <div className="flex flex-col md:flex-row gap-4">
                    <input
                      type="text"
                      className="flex-grow px-4 py-3 border border-indigo-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white"
                      placeholder="บอกงานที่คุณต้องการทำ เช่น 'อยากทำสไลด์นำเสนองานวิจัย' หรือ 'อยากเขียนแคปชันขายเสื้อผ้า'"
                      value={taskInput}
                      onChange={(e) => setTaskInput(e.target.value)}
                      onKeyDown={(e) => e.key === 'Enter' && handleAskGemini()}
                    />
                    <button
                      onClick={handleAskGemini}
                      disabled={isGenerating || !taskInput.trim()}
                      className="flex items-center justify-center px-6 py-3 bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400 text-white font-semibold rounded-xl transition-colors shadow-md min-w-[180px]"
                    >
                      {isGenerating ? (
                        <Loader2 className="w-5 h-5 animate-spin mr-2" />
                      ) : (
                        <Sparkles className="w-5 h-5 mr-2" />
                      )}
                      {isGenerating ? 'กำลังวิเคราะห์...' : '✨ แนะนำ AI'}
                    </button>
                  </div>
                  
                  {apiError && (
                    <div className="mt-4 p-4 bg-red-50 text-red-600 rounded-xl border border-red-100">
                      {apiError}
                    </div>
                  )}

                  {recommendation && (
                    <div className="mt-6 p-5 bg-white rounded-2xl border border-indigo-100 shadow-sm animate-in duration-500">
                      <h3 className="font-semibold text-indigo-900 mb-3 flex items-center">
                        <Bot className="w-5 h-5 mr-2" /> คำแนะนำจากระบบ:
                      </h3>
                      <div className="text-gray-700 whitespace-pre-wrap leading-relaxed">
                        {recommendation}
                      </div>
                    </div>
                  )}
                </div>

                {/* Dashboard Grid */}
                {filteredData.length === 0 ? (
                  <div className="text-center py-20 bg-white rounded-3xl border border-gray-100">
                    <Search className="h-12 w-12 text-gray-300 mx-auto mb-4" />
                    <p className="text-gray-500 text-lg">ไม่พบ AI หรือฟังก์ชันที่คุณค้นหา</p>
                  </div>
                ) : (
                  <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                    {filteredData.map((category) => (
                      <div 
                        key={category.id} 
                        className="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow duration-300 flex flex-col h-full"
                      >
                        <div className={`p-6 bg-gradient-to-br ${category.gradient} flex items-center space-x-4`}>
                          <div className="bg-white/20 p-2.5 rounded-xl backdrop-blur-sm">
                            {category.icon}
                          </div>
                          <div>
                            <h2 className="text-xl font-bold text-white tracking-tight">{category.title}</h2>
                            <p className="text-white/80 text-sm font-medium">{category.subtitle}</p>
                          </div>
                        </div>

                        <div className="p-5 flex-grow flex flex-col space-y-4">
                          {category.tools.map((tool, index) => (
                            <div key={index} className="flex flex-col h-full bg-gray-50 rounded-2xl p-4 border border-gray-100 hover:border-blue-200 hover:bg-blue-50/50 transition-colors">
                              <div className="flex-grow">
                                <h3 className="font-bold text-gray-900 text-lg mb-2">{tool.name}</h3>
                                <p className="text-sm text-gray-600 leading-relaxed mb-4">
                                  {tool.desc}
                                </p>
                              </div>
                              <a 
                                href={tool.url}
                                target="_blank"
                                rel="noopener noreferrer"
                                className="inline-flex items-center justify-center w-full px-4 py-2.5 text-sm font-semibold text-white bg-gray-900 hover:bg-blue-600 rounded-xl transition-all duration-200 shadow-sm hover:shadow group"
                              >
                                เข้าใช้งาน
                                <ExternalLink className="w-4 h-4 ml-2 group-hover:translate-x-1 transition-transform" />
                              </a>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
